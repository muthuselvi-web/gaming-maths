<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
        .form-container { display: none; }
        .form-container.active { display: block; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin: 5px 0; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .toggle { background: #6c757d; }
        .back-btn { position: fixed; right: 20px; top: 20px; width: auto; padding: 10px 20px; background: #dc3545; border-radius: 5px; }
        .back-btn:hover { background: #c82333; }
        .message { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.history.back()">← Back</button>
    
    <div id="signup-form" class="form-container active">
        <h2>Signup</h2>
        <input type="text" id="signup-username" placeholder="Username" required>
        <input type="password" id="signup-password" placeholder="Password" required>
        <button onclick="signup()">Signup</button>
        <button class="toggle" onclick="toggleForm()">Go to Login</button>
        <div id="signup-message"></div>
    </div>

    <div id="login-form" class="form-container">
        <h2>Login</h2>
        <input type="text" id="login-username" placeholder="Username" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button onclick="login()">Login</button>
        <button class="toggle" onclick="toggleForm()">Go to Signup</button>
        <div id="login-message"></div>
    </div>

    <script>
        function toggleForm() {
            document.getElementById('signup-form').classList.toggle('active');
            document.getElementById('login-form').classList.toggle('active');
        }

        function signup() {
            const username = document.getElementById('signup-username').value;
            const password = document.getElementById('signup-password').value;

            if (!username || !password) {
                showMessage('signup-message', 'All fields are required', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '{}');
            
            if (users[username]) {
                showMessage('signup-message', 'Username already exists', 'error');
                return;
            }

            users[username] = password;
            localStorage.setItem('users', JSON.stringify(users));
            
            showMessage('signup-message', 'Signup successful!', 'success');
            setTimeout(() => {
                localStorage.setItem('currentUser', username);
                window.location.href = 'main-page.html';
            }, 1500);
        }

        function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                showMessage('login-message', 'All fields are required', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '{}');
            
            if (!users[username]) {
                showMessage('login-message', 'Username not found', 'error');
                return;
            }

            if (users[username] !== password) {
                showMessage('login-message', 'Incorrect password', 'error');
                return;
            }

            showMessage('login-message', 'Login successful!', 'success');
            setTimeout(() => {
                localStorage.setItem('currentUser', username);
                window.location.href = 'main-page.html';
            }, 1500);
        }

        function showMessage(elementId, message, type) {
            const msgElement = document.getElementById(elementId);
            msgElement.innerHTML = `<div class="message ${type}">${message}</div>`;
            setTimeout(() => msgElement.innerHTML = '', 3000);
        }
    </script>
</body>
</html>
